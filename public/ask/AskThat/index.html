<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Send an Anonymous Message</title>
  <meta name="description" content="Send an anonymous message. 100% private — they'll never know it was you. Try it and create your own free link.">
  <meta property="og:title" content="Send an anonymous message">
  <meta property="og:description" content="100% anonymous messaging. They'll never know it was you.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://askthat.pages.dev/ask/AskThat">
  <meta property="og:image" content="https://askthat.pages.dev/og.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="robots" content="index, follow">
  <meta name="theme-color" content="#0d0a08">
  <link rel="canonical" href="https://askthat.pages.dev/ask/AskThat">
  <link rel="icon" type="image/png" sizes="32x32" href="/icon-32x32.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192x192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.json">
  <script type="application/ld+json">
  {
    "@context":"https://schema.org",
    "@graph":[
      {
        "@type":"WebSite",
        "@id":"https://askthat.pages.dev/#website",
        "url":"https://askthat.pages.dev",
        "name":"AskThat",
        "description":"Anonymous messaging platform — receive honest messages from friends",
        "potentialAction":{"@type":"SearchAction","target":{"@type":"EntryPoint","urlTemplate":"https://askthat.pages.dev/ask/{username}"},"query-input":"required name=username"}
      },
      {
        "@type":"WebPage",
        "@id":"https://askthat.pages.dev/ask/AskThat#webpage",
        "url":"https://askthat.pages.dev/ask/AskThat",
        "name":"Ask AskThat — Anonymous Messaging",
        "description":"Send AskThat an anonymous message. 100% private.",
        "isPartOf":{"@id":"https://askthat.pages.dev/#website"},
        "breadcrumb":{
          "@type":"BreadcrumbList",
          "itemListElement":[
            {"@type":"ListItem","position":1,"name":"Home","item":"https://askthat.pages.dev"},
            {"@type":"ListItem","position":2,"name":"Ask AskThat","item":"https://askthat.pages.dev/ask/AskThat"}
          ]
        }
      }
    ]
  }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0d0a08;--card:rgba(255,200,130,.06);--border:rgba(255,200,130,.15);--border2:rgba(255,255,255,.08);
      --primary:#ff6b35;--pink:#ff477e;--gold:#ffbf69;
      --grad:linear-gradient(135deg,#ff477e 0%,#ff6b35 48%,#ffbf69 100%);
      --grad-t:linear-gradient(135deg,#ff477e,#ffbf69);
      --text:#fff8f0;--text2:rgba(255,248,240,.65);--text3:rgba(255,248,240,.36);
      --r:22px;--r-sm:14px;
    }
    html,body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
    .orbs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
    .orb{position:absolute;border-radius:50%;filter:blur(72px);transform:translateZ(0)}
    .orb-1{width:480px;height:480px;background:#ff6b35;opacity:.12;top:-20%;left:-15%;animation:d1 22s ease-in-out infinite alternate}
    .orb-2{width:360px;height:360px;background:#ff477e;opacity:.09;bottom:-5%;right:-10%;animation:d2 28s ease-in-out infinite alternate}
    @keyframes d1{to{transform:translate(28px,-34px)}}
    @keyframes d2{to{transform:translate(-22px,28px)}}
    .page{position:relative;z-index:1;max-width:480px;margin:0 auto;padding:0 18px 80px;min-height:100vh;display:flex;flex-direction:column;align-items:stretch}
    /* Top nav */
    .top-nav{display:flex;align-items:center;justify-content:space-between;padding:16px 0 10px}
    .logo{display:flex;align-items:center;gap:5px;font-family:'Syne',sans-serif;font-weight:800;font-size:18px;background:var(--grad-t);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-decoration:none}
    .btn-home{padding:8px 16px;background:rgba(255,255,255,.06);border:1px solid var(--border2);border-radius:100px;font-size:13px;color:var(--text2);text-decoration:none;transition:all .18s}
    .btn-home:hover{background:rgba(255,255,255,.1);color:var(--text)}
    /* Profile */
    .profile{text-align:center;padding:22px 0 20px}
    .avatar-wrap{position:relative;width:84px;margin:0 auto 14px}
    .avatar-ring{position:absolute;inset:-8px;border-radius:50%;background:var(--grad);opacity:.15;animation:pulse 3.2s ease-in-out infinite}
    @keyframes pulse{0%,100%{transform:scale(1);opacity:.15}50%{transform:scale(1.07);opacity:.06}}
    .avatar{width:84px;height:84px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:32px;color:#fff;box-shadow:0 0 0 4px rgba(255,107,53,.16),0 10px 36px rgba(255,107,53,.28)}
    .profile-name{font-family:'Syne',sans-serif;font-weight:800;font-size:26px;letter-spacing:-.5px;margin-bottom:5px}
    .profile-tag{font-size:14px;color:var(--text2);font-weight:300}
    /* Card */
    .msg-card{background:linear-gradient(160deg,rgba(255,200,130,.08),rgba(111,76,255,.03));border:1px solid var(--border);border-radius:var(--r);padding:20px;position:relative;overflow:hidden;animation:cardUp .4s .08s ease both}
    @keyframes cardUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
    .msg-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,107,53,.04),transparent 60%);pointer-events:none}
    .m-textarea{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:var(--r-sm);padding:14px 15px;font-size:15px;font-family:'DM Sans',sans-serif;color:var(--text);outline:none;resize:none;min-height:120px;line-height:1.65;transition:border-color .2s,box-shadow .2s}
    .m-textarea::placeholder{color:var(--text3)}
    .m-textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(255,107,53,.12)}
    .char-row{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin:10px 0 18px}
    .btn-send{width:100%;padding:17px;background:var(--grad);border:none;border-radius:var(--r-sm);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;color:#fff;cursor:pointer;transition:opacity .2s,transform .15s,box-shadow .2s;box-shadow:0 4px 28px rgba(255,107,53,.34);display:flex;align-items:center;justify-content:center;gap:8px}
    .btn-send:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 8px 40px rgba(255,107,53,.48)}
    .btn-send:active{transform:scale(.99)}
    .btn-send:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
    .send-meta{display:flex;align-items:center;justify-content:center;gap:5px;font-size:11px;color:var(--text3);margin-top:11px}
    .err-msg{font-size:13px;color:#f472b6;margin-top:10px;display:none;text-align:center}
    .err-msg.show{display:block}
    .spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .65s linear infinite;display:none}
    .spinner.show{display:block}
    @keyframes spin{to{transform:rotate(360deg)}}
    /* Success */
    .success-area{display:none;flex-direction:column;align-items:center;text-align:center;padding:28px 8px;gap:12px;position:relative}
    .success-area.show{display:flex;animation:cardUp .35s ease both}
    .success-icon{width:64px;height:64px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 36px rgba(255,107,53,.38);animation:pop .4s cubic-bezier(.34,1.56,.64,1) both}
    @keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}
    .success-title{font-family:'Syne',sans-serif;font-weight:800;font-size:22px}
    .success-sub{font-size:14px;color:var(--text2);line-height:1.55;max-width:320px}
    .btn-again{background:rgba(255,255,255,.05);border:1px solid var(--border2);border-radius:var(--r-sm);padding:12px 28px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;color:var(--text2);cursor:pointer;transition:all .18s}
    .btn-again:hover{background:rgba(255,255,255,.1);color:var(--text)}
    /* Create own CTA */
    .own-section{margin-top:26px;animation:cardUp .4s .2s ease both}
    .own-divider{display:flex;align-items:center;gap:10px;margin-bottom:14px}
    .own-divider-line{flex:1;height:1px;background:var(--border2)}
    .own-divider-txt{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);white-space:nowrap}
    .btn-create-own{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;padding:18px;background:var(--grad);border:none;border-radius:var(--r-sm);font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;color:#fff;text-decoration:none;cursor:pointer;position:relative;overflow:hidden;box-shadow:0 6px 32px rgba(255,107,53,.38);transition:opacity .2s,transform .15s,box-shadow .2s}
    .btn-create-own::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.14),transparent);transform:translateX(-100%);animation:shimmer 2.4s ease-in-out infinite}
    @keyframes shimmer{to{transform:translateX(100%)}}
    .btn-create-own:hover{opacity:.92;transform:translateY(-2px);box-shadow:0 10px 44px rgba(255,107,53,.55)}
    .btn-create-own-sub{font-size:12px;color:var(--text3);text-align:center;margin-top:9px}
    .btn-create-own-sub a{color:var(--primary);text-decoration:none;font-weight:600}
    /* Confetti */
    #confetti-canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;border-radius:var(--r)}
  </style>
  <script>if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js');</script>
</head>
<body>
<div class="orbs" aria-hidden="true"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>
<div class="page">

  <nav class="top-nav">
    <a href="/" class="logo">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 28 28"><defs><linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#ff477e"/><stop offset="48%" stop-color="#ff6b35"/><stop offset="100%" stop-color="#ffbf69"/></linearGradient></defs><text x="14" y="22" font-size="26" font-family="Georgia,serif" font-weight="bold" text-anchor="middle" fill="url(#lg)">@</text></svg>
      AskThat
    </a>
    <a href="/" class="btn-home">← Home</a>
  </nav>

  <div class="profile">
    <div class="avatar-wrap">
      <div class="avatar-ring" aria-hidden="true"></div>
      <div class="avatar">@</div>
    </div>
    <h1 class="profile-name">AskThat</h1>
    <p class="profile-tag">wants your honest anonymous message</p>
  </div>

  <div class="msg-card">
    <canvas id="confetti-canvas"></canvas>
    <div id="form-area">
      <textarea class="m-textarea" id="msg-input"
        placeholder="Something you'd never say to their face…"
        maxlength="500" rows="5" autocomplete="off" spellcheck="true"
        aria-label="Your anonymous message"></textarea>
      <div class="char-row">
        <span id="char-num">0 / 500</span>
        <span>100% anonymous</span>
      </div>
      <button class="btn-send" id="send-btn" disabled>
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none"><path d="M2.5 7.5h10M8.5 3.5l4 4-4 4" stroke="white" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span id="btn-txt">Send anonymously</span>
        <div class="spinner" id="btn-spin"></div>
      </button>
      <div class="send-meta">
        <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><circle cx="5.5" cy="5.5" r="4.5" stroke="currentColor" stroke-width="1.2"/><path d="M5.5 3v3l2 1" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
        No account needed · No tracking
      </div>
      <p class="err-msg" id="err-msg"></p>
    </div>
    <div class="success-area" id="success-area">
      <div class="success-icon">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none"><path d="M5 14l6 6 12-12" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <h2 class="success-title">Sent 🚀</h2>
      <p class="success-sub">Your message was delivered anonymously. They'll never know it was you.</p>
      <button class="btn-again" id="btn-again">↩ Send another</button>
    </div>
  </div>

  <div class="own-section">
    <div class="own-divider">
      <div class="own-divider-line"></div>
      <span class="own-divider-txt">✨ want your own?</span>
      <div class="own-divider-line"></div>
    </div>
    <a href="/" class="btn-create-own">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 1v14M1 8h14" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>
      Create your free link
    </a>
    <p class="btn-create-own-sub">Get your own anonymous link in seconds · <a href="/">askthat.pages.dev</a></p>
  </div>

</div>

<script>
(function(){
  'use strict';
  const BAD = /\b(fuck|shit|bitch|cunt|nigger|nigga|faggot|retard|kys|kill\s*your?self|rape|molest|slut|whore|motherfucker|dickhead|nazi)\b/i;
  const textarea = document.getElementById('msg-input');
  const charNum  = document.getElementById('char-num');
  const sendBtn  = document.getElementById('send-btn');
  const btnTxt   = document.getElementById('btn-txt');
  const btnSpin  = document.getElementById('btn-spin');
  const errMsg   = document.getElementById('err-msg');

  textarea.addEventListener('input', () => {
    const n = textarea.value.length;
    charNum.textContent = n + ' / 500';
    sendBtn.disabled = n === 0;
  });

  function confetti() {
    const canvas = document.getElementById('confetti-canvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
    const COLS = ['#ff477e','#ff6b35','#ffbf69','#4ade80','#60a5fa','#a78bfa'];
    const ps = Array.from({length:55},()=>({
      x:Math.random()*canvas.width, y:Math.random()*canvas.height*.3-canvas.height*.05,
      vx:(Math.random()-.5)*4, vy:Math.random()*3+2,
      r:Math.random()*6+3, c:COLS[Math.floor(Math.random()*COLS.length)],
      rot:Math.random()*360, rs:(Math.random()-.5)*8, life:1
    }));
    (function draw(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      let alive=false;
      ps.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.rot+=p.rs;p.life-=.013;if(p.life<=0)return;alive=true;
        ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);ctx.globalAlpha=p.life;
        ctx.fillStyle=p.c;ctx.fillRect(-p.r,-p.r/2,p.r*2,p.r);ctx.restore();});
      if(alive)requestAnimationFrame(draw);else ctx.clearRect(0,0,canvas.width,canvas.height);
    })();
  }

  const PLACEHOLDERS = [
    "Something you'd never say to their face…",
    "Your most honest thought about them…",
    "What everyone thinks but no one says…",
    "Be real — they'll never know it was you…",
    "A message you've been holding back…",
  ];
  let phIdx = 0;
  setInterval(()=>{
    if(textarea.value || document.activeElement===textarea) return;
    phIdx=(phIdx+1)%PLACEHOLDERS.length;
    textarea.placeholder = PLACEHOLDERS[phIdx];
  }, 3800);

  async function send() {
    const text = textarea.value.trim();
    if (!text) return;
    if (BAD.test(text)) { errMsg.textContent='Please keep it respectful.'; errMsg.classList.add('show'); return; }
    errMsg.classList.remove('show');
    sendBtn.disabled=true; btnTxt.textContent='Sending…'; btnSpin.classList.add('show');
    // Real send to AskThat's inbox — but we discard it server-side
    try {
      await fetch('/api/send',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({username:'askthat',text,demo:true})});
    } catch(_){}
    await new Promise(r=>setTimeout(r,700));
    btnSpin.classList.remove('show');
    document.getElementById('form-area').style.display='none';
    document.getElementById('success-area').classList.add('show');
    confetti();
  }

  sendBtn.addEventListener('click', send);
  textarea.addEventListener('keydown', e=>{if(e.key==='Enter'&&(e.metaKey||e.ctrlKey))send();});
  document.getElementById('btn-again').addEventListener('click',()=>{
    textarea.value=''; charNum.textContent='0 / 500'; sendBtn.disabled=true;
    btnTxt.textContent='Send anonymously';
    document.getElementById('form-area').style.display='';
    document.getElementById('success-area').classList.remove('show');
    textarea.focus();
  });
})();
</script>
</body>
</html>
