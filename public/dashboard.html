<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=0.9, viewport-fit=cover">
  <meta name="google-site-verification" content="1cIP8Y5Xf6O5GOeWqWvDquYAe8mI1JjlfXgCe4M9B-E" />
  <title>My Inbox — AskThat</title>
  <meta name="description" content="Read your anonymous messages on AskThat.">
  <meta name="robots" content="noindex,nofollow">
  <meta name="theme-color" content="#0d0a08">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/icon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/icon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Space+Grotesk:wght@600;700&family=Righteous&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0a08; --bg2: #13100c; --bg3: #1a1208;
      --card: rgba(255,200,130,0.06); --border: rgba(255,200,130,0.18); --border2: rgba(255,200,130,0.07);
      --primary: #ff6b35; --pri-hi: #ff8c5a; --pink: #ff477e; --gold: #ffbf69; --accent: #ffcf96;
      --green: #4ade80; --red: #f87171;
      --grad: linear-gradient(135deg,#ff477e 0%,#ff6b35 48%,#ffbf69 100%);
      --grad-t: linear-gradient(135deg,#ff477e,#ff6b35,#ffbf69);
      --text: #fff8f0; --text2: rgba(255,248,240,0.65); --text3: rgba(255,248,240,0.36);
      --r: 18px; --r-sm: 12px;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; line-height: 1.6; min-height: 100vh; overflow-x: hidden; }
    .orbs { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .orb  { position: absolute; border-radius: 50%; filter: blur(68px); transform: translateZ(0); }
    .orb-1 { width: 540px; height: 540px; background: #ff6b35; opacity: 0.09; top: -20%; right: -10%; animation: d1 24s ease-in-out infinite alternate; }
    .orb-2 { width: 400px; height: 400px; background: #ff477e; opacity: 0.07; bottom: 8%; left: -10%; animation: d2 30s ease-in-out infinite alternate; }
    @keyframes d1 { to { transform: translate(-20px,28px); } }
    @keyframes d2 { to { transform: translate(18px,-22px); } }
    body::before { content:''; position: fixed; inset:0; z-index:1; pointer-events:none; background-image: radial-gradient(ellipse at 1px 1px, rgba(255,248,240,0.04) 1px, transparent 0); background-size: 3px 3px; opacity:0.5; }

    /* ── Layout ── */
    .page { max-width: 720px; margin: 0 auto; padding: 20px 16px 80px; position: relative; z-index: 2; }

    /* ── Nav ── */
    .top-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; gap: 10px; flex-wrap: wrap; }
    .logo {
      display: inline-flex;
      align-items: center;
      white-space: nowrap;
      gap: 4px;
      text-decoration: none !important;
      -webkit-text-decoration: none; display: inline-flex; align-items: center; font-family: 'Syne', sans-serif; font-weight: 800; font-size: 19px; background: var(--grad-t); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; text-decoration: none; gap: 4px; }
    .nav-r { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .btn-sm { display: inline-flex; align-items: center; gap: 5px; padding: 8px 14px; border-radius: 100px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; text-decoration: none; transition: all .18s; border: none; white-space: nowrap; }
    .btn-sm.ol { background: var(--card); border: 1px solid var(--border2); color: var(--text2); }
    .btn-sm.ol:hover { background: rgba(255,255,255,0.08); color: var(--text); }
    .btn-sm.gr { background: var(--grad); color: #fff; box-shadow: 0 4px 16px rgba(255,107,53,.28); }
    .btn-sm.gr:hover { opacity: .88; transform: translateY(-1px); }
    .btn-sm.pu { background: rgba(124,58,237,.15); border: 1px solid rgba(124,58,237,.3); color: #c4b5fd; }
    .btn-sm.pu:hover { background: rgba(124,58,237,.25); }

    /* ── Stats Bar ── */
    .stats-bar { display: grid; grid-template-columns: repeat(2,1fr); gap: 8px; margin-bottom: 16px; }
    .stat-card { background: var(--card); border: 1px solid var(--border2); border-radius: var(--r-sm); padding: 12px 14px; text-align: center; transition: border-color .2s; }
    .stat-card:hover { border-color: rgba(255,107,53,.25); }
    .stat-val { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 22px; letter-spacing: -1px; background: var(--grad-t); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .stat-lbl { font-size: 11px; color: var(--text3); margin-top: 1px; text-transform: uppercase; letter-spacing: .05em; }

    /* ── New message banner ── */
    .new-banner { background: linear-gradient(135deg,rgba(232,68,138,.12),rgba(255,107,53,.12)); border: 1px solid rgba(255,107,53,.26); border-radius: 14px; padding: 12px 18px; display: none; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; animation: slideDown .35s ease both; }
    .new-banner.show { display: flex; }
    @keyframes slideDown { from { opacity:0; transform:translateY(-10px); } to { opacity:1; transform:translateY(0); } }
    .new-banner-txt { font-size: 14px; font-weight: 500; }
    .new-banner-txt strong { color: var(--accent); }
    .btn-banner { background: var(--grad); border: none; border-radius: 100px; padding: 7px 16px; font-family:'DM Sans',sans-serif; font-size: 12px; font-weight: 500; color: #fff; cursor: pointer; transition: opacity .2s; }
    .btn-banner:hover { opacity: .85; }

    /* ── Profile Header ── */
    .profile-hdr { background: linear-gradient(160deg,rgba(111,76,255,.09),rgba(111,76,255,.02)); border: 1px solid var(--border); border-radius: 20px; padding: 20px 22px; display: flex; align-items: center; gap: 16px; margin-bottom: 14px; backdrop-filter: blur(16px); position: relative; overflow: hidden; }
    .profile-hdr::before { content:''; position:absolute; inset:0; background:linear-gradient(120deg,rgba(255,107,53,.06),transparent 55%); pointer-events:none; }
    .avatar { width: 54px; height: 54px; border-radius: 50%; background: var(--grad); display: flex; align-items: center; justify-content: center; font-family:'Syne',sans-serif; font-weight: 800; font-size: 22px; color: #fff; flex-shrink: 0; box-shadow: 0 0 0 3px rgba(255,107,53,.22); }
    .profile-info { flex: 1; min-width: 0; }
    .profile-info h1 { font-family:'Syne',sans-serif; font-weight: 800; font-size: 18px; letter-spacing: -.3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .link-pill { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,.04); border: 1px solid var(--border2); border-radius: 100px; padding: 4px 10px 4px 6px; font-size: 12px; color: var(--text3); margin-top: 5px; max-width: 100%; overflow: hidden; }
    .link-pill span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* ── Toolbar ── */
    .toolbar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
    .search-wrap { flex: 1; min-width: 180px; position: relative; }
    .search-ico { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text3); pointer-events: none; }
    .search-input { width: 100%; background: rgba(255,255,255,.04); border: 1px solid var(--border2); border-radius: 100px; padding: 9px 14px 9px 36px; font-size: 14px; font-family:'DM Sans',sans-serif; color: var(--text); outline: none; transition: border-color .2s, box-shadow .2s; }
    .search-input::placeholder { color: var(--text3); }
    .search-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(255,107,53,.12); }
    .sort-select { background: rgba(255,255,255,.04); border: 1px solid var(--border2); border-radius: 100px; padding: 9px 14px; font-size: 13px; font-family:'DM Sans',sans-serif; color: var(--text2); outline: none; cursor: pointer; }
    .sort-select:focus { border-color: var(--primary); }

    /* ── Tabs ── */
    .tabs { display: flex; gap: 4px; margin-bottom: 14px; background: rgba(255,255,255,.03); border: 1px solid var(--border2); border-radius: 100px; padding: 4px; width: fit-content; }
    .tab { padding: 7px 16px; border-radius: 100px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all .18s; border: none; background: transparent; color: var(--text3); display: flex; align-items: center; gap: 6px; white-space: nowrap; }
    .tab .tab-count { background: rgba(255,255,255,.08); border-radius: 100px; padding: 1px 7px; font-size: 11px; font-weight: 600; }
    .tab.active { background: var(--grad); color: #fff; box-shadow: 0 2px 12px rgba(255,107,53,.28); }
    .tab.active .tab-count { background: rgba(255,255,255,.25); }

    /* ── Bulk Bar ── */
    .bulk-bar { display: none; align-items: center; gap: 10px; background: rgba(124,58,237,.1); border: 1px solid rgba(124,58,237,.25); border-radius: var(--r-sm); padding: 10px 14px; margin-bottom: 12px; flex-wrap: wrap; }
    .bulk-bar.show { display: flex; }
    .bulk-count { font-size: 13px; font-weight: 500; color: #c4b5fd; flex: 1; }
    .btn-bulk-del { background: rgba(248,113,113,.15); border: 1px solid rgba(248,113,113,.3); color: var(--red); border-radius: 8px; padding: 6px 14px; font-size: 13px; font-weight: 500; cursor: pointer; transition: background .2s; }
    .btn-bulk-del:hover { background: rgba(248,113,113,.25); }
    .btn-bulk-cancel { background: rgba(255,255,255,.06); border: 1px solid var(--border2); color: var(--text2); border-radius: 8px; padding: 6px 14px; font-size: 13px; font-weight: 500; cursor: pointer; }

    /* ── Message Cards — redesigned ── */
    .msgs-list { display: flex; flex-direction: column; gap: 10px; }

    .msg-card {
      background: linear-gradient(160deg, rgba(255,200,130,0.07) 0%, rgba(255,107,53,0.03) 100%);
      border: 1px solid var(--border2);
      border-radius: 20px;
      padding: 0;
      transition: all .22s cubic-bezier(.4,0,.2,1);
      position: relative; overflow: hidden;
      animation: cardIn .35s ease both;
    }
    @keyframes cardIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .msg-card.unread-card { border-color: rgba(255,107,53,.28); background: linear-gradient(160deg,rgba(255,107,53,.09),rgba(255,71,126,.04)); }
    .msg-card:hover { border-color: rgba(255,107,53,.35); transform: translateY(-2px); box-shadow: 0 8px 32px rgba(255,107,53,.12); }
    .msg-card.selected-card { border-color: rgba(124,58,237,.45); background: rgba(124,58,237,.08); }

    /* Left accent bar — varies per mood */
    .msg-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; border-radius:20px 0 0 20px; background:var(--grad); opacity:0.7; }
    .msg-card.mood-wholesome::before { background:linear-gradient(180deg,#4ade80,#22d3ee); }
    .msg-card.mood-funny::before     { background:linear-gradient(180deg,#facc15,#fb923c); }
    .msg-card.mood-flirty::before    { background:linear-gradient(180deg,#f472b6,#ff477e); }
    .msg-card.mood-deep::before      { background:linear-gradient(180deg,#a78bfa,#7c3aed); }
    .msg-card.mood-sad::before       { background:linear-gradient(180deg,#60a5fa,#818cf8); }
    .msg-card.mood-supportive::before{ background:linear-gradient(180deg,#34d399,#10b981); }
    .msg-card.mood-weird::before     { background:linear-gradient(180deg,#fb923c,#f43f5e); }
    .msg-card.mood-spicy::before     { background:linear-gradient(180deg,#ff477e,#ff6b35); }

    .card-inner { padding: 16px 18px 14px 22px; }

    /* Big decorative quote mark */
    .card-quote-mark {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 72px; line-height: 1; font-weight: 900;
      color: var(--primary); opacity: 0.13;
      position: absolute; top: 4px; left: 14px;
      pointer-events: none; user-select: none;
    }
    .msg-card.mood-wholesome .card-quote-mark { color: #4ade80; }
    .msg-card.mood-funny .card-quote-mark     { color: #facc15; }
    .msg-card.mood-flirty .card-quote-mark    { color: #f472b6; }
    .msg-card.mood-deep .card-quote-mark      { color: #a78bfa; }
    .msg-card.mood-sad .card-quote-mark       { color: #60a5fa; }

    .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 8px; }
    .card-badges { display: flex; gap: 5px; flex-wrap: wrap; flex-shrink: 0; align-items: center; }
    .badge { display: inline-flex; align-items: center; gap: 3px; font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 100px; text-transform: uppercase; letter-spacing: .05em; }
    .badge-new  { background: rgba(255,107,53,.15); color: var(--pri-hi); border: 1px solid rgba(255,107,53,.25); }
    .badge-known { background: rgba(74,222,128,.1); color: #4ade80; border: 1px solid rgba(74,222,128,.2); }

    /* Message text — the star of the show */
    .card-text {
      font-family: 'Instrument Serif', Georgia, serif;
      font-size: 17px; color: var(--text); line-height: 1.7;
      word-break: break-word; padding-left: 4px;
      margin-bottom: 10px;
    }
    .msg-card.msg-short .card-text  { font-size: 20px; font-weight: 400; }
    .msg-card.msg-medium .card-text { font-size: 17px; }
    .msg-card.msg-long .card-text   { font-size: 15px; line-height: 1.65; font-family: 'DM Sans', sans-serif; }

    .card-poll { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; padding: 8px 10px; background: rgba(255,255,255,.03); border: 1px solid var(--border2); border-radius: 8px; }
    .poll-chip { font-size: 11px; color: var(--text2); background: rgba(255,255,255,.06); border-radius: 100px; padding: 3px 10px; }

    .card-footer { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .card-time { font-size: 11px; color: var(--text3); display: flex; align-items: center; gap: 4px; font-family: 'DM Sans', sans-serif; }
    .geo-flag  { font-size: 14px; line-height: 1; }
    .dot-sep { color: var(--text3); font-size: 9px; }
    .read-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--primary); flex-shrink: 0; animation: pulse2 2s ease-in-out infinite; }
    @keyframes pulse2 { 0%,100%{opacity:1} 50%{opacity:.4} }
    .card-actions { display: flex; gap: 5px; margin-left: auto; }
    .icon-btn { width: 32px; height: 32px; border-radius: 9px; border: 1px solid var(--border2); background: rgba(255,255,255,.03); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all .18s; color: var(--text3); }
    .icon-btn:hover { background: rgba(255,255,255,.08); color: var(--text); border-color: rgba(255,255,255,.15); }
    .icon-btn.del:hover { background: rgba(248,113,113,.12); color: var(--red); border-color: rgba(248,113,113,.3); }
    .icon-btn.story:hover { background: rgba(124,58,237,.12); color: #c4b5fd; border-color: rgba(124,58,237,.3); }

    /* mood chip on card */
    .mood-chip { display:inline-flex; align-items:center; gap:3px; font-size:10px; font-weight:600; padding:2px 8px; border-radius:100px; border:1px solid; }
    .mood-chip.mood-wholesome { background:rgba(74,222,128,.1);  color:#4ade80;  border-color:rgba(74,222,128,.2); }
    .mood-chip.mood-funny     { background:rgba(250,204,21,.1);  color:#facc15;  border-color:rgba(250,204,21,.2); }
    .mood-chip.mood-flirty    { background:rgba(244,114,182,.1); color:#f472b6;  border-color:rgba(244,114,182,.2); }
    .mood-chip.mood-deep      { background:rgba(167,139,250,.1); color:#a78bfa;  border-color:rgba(167,139,250,.2); }
    .mood-chip.mood-sad       { background:rgba(96,165,250,.1);  color:#60a5fa;  border-color:rgba(96,165,250,.2); }
    .mood-chip.mood-supportive{ background:rgba(52,211,153,.1);  color:#34d399;  border-color:rgba(52,211,153,.2); }
    .mood-chip.mood-weird     { background:rgba(251,146,60,.1);  color:#fb923c;  border-color:rgba(251,146,60,.2); }
    .mood-chip.mood-spicy     { background:rgba(255,71,126,.1);  color:#ff477e;  border-color:rgba(255,71,126,.2); }

    /* ── Poll Results ── */
    .poll-section { background: var(--card); border: 1px solid var(--border2); border-radius: var(--r); padding: 20px; margin-bottom: 14px; display: none; }
    .poll-section.show { display: block; }
    .poll-section-title { font-family:'Syne',sans-serif; font-weight: 700; font-size: 14px; margin-bottom: 14px; display: flex; align-items: center; gap: 7px; }
    .poll-cat { margin-bottom: 14px; }
    .poll-cat:last-child { margin-bottom: 0; }
    .poll-cat-label { font-size: 12px; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 7px; }
    .poll-bar-wrap { display: flex; flex-direction: column; gap: 5px; }
    .poll-bar-row { display: flex; align-items: center; gap: 8px; }
    .poll-bar-label { font-size: 13px; color: var(--text2); min-width: 100px; }
    .poll-bar-track { flex: 1; height: 6px; background: rgba(255,255,255,.08); border-radius: 100px; overflow: hidden; }
    .poll-bar-fill { height: 100%; background: var(--grad); border-radius: 100px; transition: width .6s ease; }
    .poll-bar-count { font-size: 12px; color: var(--text3); min-width: 24px; text-align: right; }

    /* ── Empty state ── */
    .empty { text-align: center; padding: 48px 20px; }
    .empty-icon { font-size: 42px; margin-bottom: 14px; opacity: .7; }
    .empty-title { font-family:'Syne',sans-serif; font-weight: 700; font-size: 18px; margin-bottom: 8px; letter-spacing: -.3px; }
    .empty-sub { font-size: 14px; color: var(--text2); max-width: 280px; margin: 0 auto; }

    /* ── Load More ── */
    .load-more-wrap { text-align: center; margin-top: 18px; }
    .btn-load-more { background: var(--card); border: 1px solid var(--border2); border-radius: 100px; padding: 10px 24px; font-size: 14px; font-weight: 500; color: var(--text2); cursor: pointer; transition: all .2s; }
    .btn-load-more:hover { background: rgba(255,255,255,.08); color: var(--text); }

    /* ── Toast ── */
    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(12px); background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 10px 20px; font-size: 14px; font-weight: 500; z-index: 999; opacity: 0; transition: opacity .22s, transform .22s; pointer-events: none; backdrop-filter: blur(20px); box-shadow: 0 8px 32px rgba(0,0,0,.5); white-space: nowrap; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.green { border-color: rgba(74,222,128,.3); color: var(--green); }
    .toast.red   { border-color: rgba(248,113,113,.3); color: var(--red); }

    /* ── Instagram Story Modal ── */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 200; backdrop-filter: blur(6px); align-items: center; justify-content: center; padding: 20px; }
    .modal-overlay.show { display: flex; }
    .modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 24px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; padding: 28px; position: relative; }
    .modal-close { position: absolute; top: 16px; right: 16px; width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border2); background: rgba(255,255,255,.05); display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text3); transition: all .18s; }
    .modal-close:hover { color: var(--text); background: rgba(255,255,255,.10); }
    .modal-title { font-family:'Syne',sans-serif; font-weight: 800; font-size: 18px; letter-spacing: -.3px; margin-bottom: 5px; }
    .modal-sub { font-size: 13px; color: var(--text2); margin-bottom: 20px; }
    .story-styles { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 18px; }
    .story-style-btn { padding: 8px; border-radius: 10px; border: 2px solid var(--border2); background: var(--card); cursor: pointer; text-align: center; font-size: 11px; font-weight: 600; color: var(--text3); transition: all .18s; text-transform: uppercase; letter-spacing: .04em; }
    .story-style-btn.active { border-color: var(--primary); color: var(--primary); background: rgba(255,107,53,.08); }
    .story-preview-wrap { border-radius: 14px; overflow: hidden; margin-bottom: 18px; aspect-ratio: 9/16; max-height: 320px; display: flex; align-items: center; justify-content: center; background: #0d0a08; }
    canvas#story-canvas { max-width: 100%; max-height: 100%; border-radius: 10px; }
    .story-actions { display: flex; gap: 8px; }
    .btn-story-dl { flex: 1; padding: 13px; background: var(--grad); border: none; border-radius: var(--r-sm); font-family:'DM Sans',sans-serif; font-size: 14px; font-weight: 500; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 7px; transition: opacity .2s; box-shadow: 0 4px 18px rgba(255,107,53,.3); }
    .btn-story-dl:hover { opacity: .88; }
    .btn-story-share { padding: 13px 16px; background: var(--card); border: 1px solid var(--border2); border-radius: var(--r-sm); font-family:'DM Sans',sans-serif; font-size: 14px; font-weight: 500; color: var(--text2); cursor: pointer; transition: background .2s; }
    .btn-story-share:hover { background: rgba(255,255,255,.08); }

  <script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
</head>
<body>
<div class="orbs" aria-hidden="true"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>
<div class="page">
  <nav class="top-nav">
    <a href="/" class="logo" aria-label="AskThat">
      <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 28 28" aria-hidden="true"><defs><linearGradient id="lg-at" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#ff477e"/><stop offset="48%" stop-color="#ff6b35"/><stop offset="100%" stop-color="#ffbf69"/></linearGradient></defs><text x="14" y="22" font-size="26" font-family="Georgia,serif" font-weight="bold" text-anchor="middle" fill="url(#lg-at)">@</text></svg>AskThat
    </a>

    <div class="load-more-wrap" id="load-more-wrap" style="display:none"><button class="btn-load-more" id="btn-load-more">Load more</button></div>

      <button class="btn-story-wa" id="btn-story-wa"><svg width="15" height="15" viewBox="0 0 24 24" fill="#25D366"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a9.626 9.626 0 00-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.125.557 4.118 1.528 5.845L0 24l6.335-1.652A11.954 11.954 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.818 9.818 0 01-5.006-1.371l-.36-.214-3.727.977.994-3.638-.235-.374A9.818 9.818 0 012.182 12C2.182 6.578 6.578 2.182 12 2.182S21.818 6.578 21.818 12 17.422 21.818 12 21.818z"/></svg>WhatsApp</button>
      <button class="btn-story-share" id="btn-story-share-native">Share</button>

    <div class="caption-row" id="caption-row" style="display:none">

<div class="confirm-overlay" id="confirm-overlay" role="dialog" aria-modal="true">
  <div class="confirm-box">
    <div class="confirm-icon" id="confirm-icon">🗑️</div>
    <div class="confirm-title" id="confirm-title">Delete message?</div>
    <div class="confirm-desc" id="confirm-desc">This cannot be undone.</div>
    <div class="confirm-btns">
      <button class="confirm-cancel" id="confirm-cancel">Cancel</button>
      <button class="confirm-ok" id="confirm-ok">Delete</button>
    </div>
  </div>
</div>
<div class="toast" id="toast" role="alert" aria-live="assertive"></div>

<script>
(function() {
  'use strict';

  const USERNAME_RE = /^[a-zA-Z0-9_.-]+$/;

  // Primary: injected server-side by CF Function (window.__ASKTHAT_DASHBOARD_USER__)
  // Fallbacks: ?u= query param, or /dashboard/username path segment
  const params    = new URLSearchParams(location.search);
  const pathMatch = location.pathname.match(/\/dashboard\/([^/?#]+)/);
  const pathUser  = pathMatch ? pathMatch[1] : '';
  let   user      = (
    (typeof window.__ASKTHAT_DASHBOARD_USER__ === 'string' && window.__ASKTHAT_DASHBOARD_USER__
      ? window.__ASKTHAT_DASHBOARD_USER__ : null) ||
    params.get('u') ||
    pathUser ||
    ''
  ).trim().toLowerCase();
  if (user.endsWith('.html')) user = user.slice(0, -5);

  if (!user || user.length < 1 || user.length > 30 || !USERNAME_RE.test(user)) {
    window.location.href = '/'; return;
  }

  // Clean up ?u= from the address bar (only needed for CF Function to create the link)
  if (location.search) history.replaceState(null, '', location.pathname);

  const BASE_URL = `${location.origin}/ask/${user}`;

  let messages    = [];
  let filter      = 'all';
  let sortOrder   = 'newest';
  let searchQ     = '';
  let cursor      = 0;
  let totalServer = 0;
  let unreadCount = 0;
  let pollStats   = null;
  let bulkMode    = false;
  let selected    = new Set();
  let lastTotal   = -1;
  let posterStyle = 'fire';
  let activeStoryMsg = null; // message being poster-ised
  let refreshTimer;
  let toastTimer;
  let authToken   = null;

  // ── DOM refs ──────────────────────────────────────────────────────────────
  const msgsList       = document.getElementById('msgs-list');
  const statBar        = document.getElementById('stats-bar');
  const statTotal      = document.getElementById('stat-total');
  const statUnread     = document.getElementById('stat-unread');
  const countAll       = document.getElementById('count-all');
  const countUnread    = document.getElementById('count-unread');
  const profileName    = document.getElementById('profile-name');
  const avatarEl       = document.getElementById('avatar-el');
  const linkDisplay    = document.getElementById('link-display');
  const newBanner      = document.getElementById('new-banner');
  const newBannerCount = document.getElementById('new-banner-count');
  const searchInput    = document.getElementById('search-input');
  const sortSelect     = document.getElementById('sort-select');
  const bulkBar        = document.getElementById('bulk-bar');
  const bulkCountTxt   = document.getElementById('bulk-count-txt');
  const loadMoreWrap   = document.getElementById('load-more-wrap');
  const pollContent    = document.getElementById('poll-content');

  authToken = (typeof window.__ASKTHAT_TOKEN__ === 'string') ? window.__ASKTHAT_TOKEN__ : null;

  // ── Current link mode — stored server-side, URL always stays clean ────────
  let currentMode = 'ask';
  let aiGameText  = '';
  let modeSaveTimer = null;

  function currentLink() {
    return BASE_URL; // Always clean — mode is server-side
  }

  function updateLinkDisplay() {
    const heroEl = document.getElementById('link-hero-url');
    if (heroEl) heroEl.textContent = BASE_URL.replace('https://','');
    const captionEl = document.getElementById('caption-url-txt');
    if (captionEl) captionEl.textContent = BASE_URL;
  }

  async function saveMode(mode) {
    try {
      await fetch('/api/get', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: user, token: authToken, field: 'mode', value: mode }),
      });
    } catch(_) {}
  }

  // ── Bottom nav tabs ───────────────────────────────────────────────────────
  let currentPanel = 'inbox';
  function switchPanel(panel) {
    currentPanel = panel;
    document.querySelectorAll('.section-panel').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.bnav-tab').forEach(el => el.classList.remove('active'));
    const panelEl = document.getElementById(`panel-${panel}`);
    const tabEl   = document.getElementById(`bnav-${panel}`);
    if (panelEl) panelEl.classList.add('active');
    if (tabEl)   tabEl.classList.add('active');
    if (panel === 'link' && !postersGenerated) buildPosterStrip();
    if (panel === 'poll') initPollSection();
  }
  document.querySelectorAll('.bnav-tab').forEach(btn => {
    btn.addEventListener('click', () => switchPanel(btn.dataset.panel));
  });

  // ── Mode grid ─────────────────────────────────────────────────────────────
  // Load saved mode on init
  fetch(`/api/get?username=${encodeURIComponent(user)}&field=mode`)
    .then(r => r.json())
    .then(d => {
      if (d.mode && d.mode !== 'ask') {
        currentMode = d.mode;
        document.querySelectorAll('.mode-card').forEach(c => {
          c.classList.toggle('active', c.dataset.type === currentMode);
        });
      }
    }).catch(()=>{});

  document.querySelectorAll('.mode-card').forEach(card => {
    card.addEventListener('click', () => {
      if (card.dataset.type === currentMode) return;
      document.querySelectorAll('.mode-card').forEach(c => {
        c.classList.remove('active');
        c.classList.remove('just-selected');
      });
      card.classList.add('active');
      // Trigger spring animation
      requestAnimationFrame(() => card.classList.add('just-selected'));
      currentMode = card.dataset.type;
      updateLinkDisplay();
      postersGenerated = false;
      buildPosterStrip();
      clearTimeout(modeSaveTimer);
      modeSaveTimer = setTimeout(() => {
        saveMode(currentMode).then(() => showToast('Mode saved ✓'));
      }, 400);
    });
  });

  // Link copy/share buttons in Link panel
  document.getElementById('btn-link-copy')?.addEventListener('click', () => {
    navigator.clipboard.writeText(currentLink()).then(() => showToast('Link copied!')).catch(()=>{});
  });
  document.getElementById('btn-link-share-native')?.addEventListener('click', async () => {
    if (navigator.share) {
      try { await navigator.share({ url: currentLink(), title: `Ask ${user} anonymously` }); return; } catch(_){}
    }
    navigator.clipboard.writeText(currentLink()).then(()=>showToast('Link copied!')).catch(()=>{});
  });

  // ── 3-poster strip ────────────────────────────────────────────────────────
  const POSTER_STYLES_ORDER = ['fire','dark','neon'];
  let postersGenerated = false;
  let selectedPosterStyle = 'fire';

  function buildPosterStrip() {
    const strip = document.getElementById('poster-strip');
    const spin  = document.getElementById('poster-spin');
    const dlRow = document.getElementById('poster-dl-row');
    if (!strip) return;
    postersGenerated = true;
    strip.innerHTML = '';
    dlRow.style.display = 'none';
    spin.style.display  = 'block';

    POSTER_STYLES_ORDER.forEach((style, idx) => {
      const wrap   = document.createElement('div');
      wrap.className = 'poster-thumb';
      if (style === selectedPosterStyle) wrap.style.borderColor = 'var(--primary)';
      const canvas = document.createElement('canvas');
      canvas.width  = 1080; canvas.height = 1920;
      canvas.style.width = '100%'; canvas.style.borderRadius = '12px'; canvas.style.display = 'block';
      const label  = document.createElement('div');
      label.className = 'poster-thumb-label';
      label.textContent = ['🔥 Fire','🌑 Dark','⚡ Neon'][idx];
      wrap.appendChild(canvas);
      wrap.appendChild(label);
      strip.appendChild(wrap);
      wrap.addEventListener('click', () => {
        selectedPosterStyle = style;
        strip.querySelectorAll('.poster-thumb').forEach(t => t.style.borderColor = 'transparent');
        wrap.style.borderColor = 'var(--primary)';
      });

      // Draw asynchronously staggered
      setTimeout(() => {
        const T = POSTER_THEMES[style] || POSTER_THEMES.fire;
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0,0,1080,1920);
        T.bg(ctx,1080,1920); T.orbs(ctx,1080,1920);
        ctx.textAlign='center';
        drawPromptPoster(ctx, T, 1080, 1920, currentMode);
        if (idx === POSTER_STYLES_ORDER.length - 1) {
          spin.style.display = 'none';
          dlRow.style.display = '';
        }
      }, idx * 80);
    });
  }

  document.getElementById('btn-poster-dl')?.addEventListener('click', () => {
    const canvases = document.querySelectorAll('.poster-thumb canvas');
    const idx = POSTER_STYLES_ORDER.indexOf(selectedPosterStyle);
    const canvas = canvases[idx >= 0 ? idx : 0];
    if (!canvas) return;
    const a = document.createElement('a');
    a.download = `askthat-${user}-${selectedPosterStyle}.png`;
    a.href = canvas.toDataURL('image/png');
    a.click();
  });

  document.getElementById('btn-poster-wa')?.addEventListener('click', () => {
    const canvases = document.querySelectorAll('.poster-thumb canvas');
    const idx = POSTER_STYLES_ORDER.indexOf(selectedPosterStyle);
    const canvas = canvases[idx >= 0 ? idx : 0];
    if (!canvas) return;
    canvas.toBlob(async blob => {
      const file = new File([blob],'askthat-story.png',{type:'image/png'});
      const txt  = `Ask me anonymously! ${currentLink()}`;
      if (navigator.canShare?.({files:[file]})) {
        try { await navigator.share({files:[file],text:txt}); return; } catch(_){}
      }
      window.open(`https://wa.me/?text=${encodeURIComponent(txt)}`, '_blank');
    }, 'image/png');
  });

  // ── AI game text for mode card ─────────────────────────────────────────────
  async function loadAIGameText() {
    try {
      // Try to get location for context
      let locContext = '';
      try {
        const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
        locContext = tz ? `timezone: ${tz}` : '';
      } catch(_){}
      const res = await fetch(`/api/groq?type=game&username=${encodeURIComponent(user)}&loc=${encodeURIComponent(locContext)}`);
      const d   = await res.json();
      aiGameText = d.game || d.prompt || '';
      const subEl = document.getElementById('mode-ai-sub');
      if (subEl && aiGameText) subEl.textContent = aiGameText.slice(0,42) + (aiGameText.length>42?'…':'');
      // Also update PROMPT_TYPES for poster usage
      if (aiGameText) PROMPT_TYPES.ai.label = aiGameText;
    } catch(_) {
      aiGameText = 'What\'s one thing you\'d never say to my face?';
      const subEl = document.getElementById('mode-ai-sub');
      if (subEl) subEl.textContent = 'AI-generated game';
    }
  }
  loadAIGameText();

  // ── Init ──────────────────────────────────────────────────────────────────
  profileName.textContent = user;
  avatarEl.textContent    = user.charAt(0).toUpperCase();
  try { localStorage.setItem('askthat_username', user); } catch(_) {}
  linkDisplay.textContent = `askthat.pages.dev/ask/${user}`;
  document.title          = `${user}'s Inbox — AskThat`;
  updateLinkDisplay();

  load(true);
  startRefresh();
  (async () => {
    try {
      const res = await fetch(`/api/stats?username=${encodeURIComponent(user)}`);
      const d   = await res.json();
      if (d.streak > 1) {

        if (nameEl && !nameEl.querySelector('.streak-pill')) {

          nameEl.appendChild(pill);

  // ── Data loading ──────────────────────────────────────────────────────────
  async function load(isInitial = false) {
    if (isInitial) {
      cursor = 0; messages = [];
      msgsList.innerHTML = `<div style="text-align:center;padding:36px"><div class="spin" style="margin:0 auto;width:22px;height:22px;border:2px solid rgba(255,255,255,.2);border-top-color:#ff6b35;border-radius:50%;animation:spin .6s linear infinite"></div></div>`;
    }
    const url = `/api/get?username=${encodeURIComponent(user)}&filter=${filter}&sort=${sortOrder}&cursor=${isInitial ? 0 : cursor}&markRead=${isInitial ? '1' : '0'}`;
    try {
      const res  = await fetch(url);
      const data = await res.json();
      if (!res.ok) { if (isInitial) msgsList.innerHTML = '<div style="text-align:center;padding:24px;color:var(--text3)">Failed to load messages.</div>'; return; }

      const incoming = data.messages || [];
      if (isInitial) messages = incoming;
      else messages = [...messages, ...incoming];

      cursor      = isInitial ? (data.nextCursor ?? 0) : (data.nextCursor ?? cursor);
      pollStats   = data.pollStats;

      updateCounts(data.total, data.unreadCount ?? 0);
      render(isInitial);
      if (pollStats) renderPollResults();
      loadMoreWrap.style.display = data.nextCursor != null ? '' : 'none';

      if (!isInitial && data.total > lastTotal && lastTotal >= 0) {
        const diff = data.total - lastTotal;
        newBannerCount.textContent = `${diff} new message${diff > 1 ? 's' : ''}`;
        newBanner.classList.add('show');
      }
      lastTotal = data.total;
      statBar.style.opacity = '1';
    } catch (_) {
      if (isInitial) msgsList.innerHTML = '<div style="text-align:center;padding:24px;color:var(--text3)">Network error.</div>';
    }
  }


  function startRefresh() {
    clearInterval(refreshTimer);
    refreshTimer = setInterval(() => load(false), 30000);
  }

  // ── Render ────────────────────────────────────────────────────────────────
  function render(replace = true) {
    const filtered = searchQ
      ? messages.filter(m => m.text.toLowerCase().includes(searchQ))
      : messages;

    if (replace) msgsList.innerHTML = '';

    if (!filtered.length) {
      const msgs = {
        all:    ['📭','No messages yet','Share your link to start receiving anonymous messages.'],
        unread: ['✓','All caught up','No unread messages.'],
        pinned: ['📌','Nothing pinned yet','Pin messages to keep them here.'],
      };
      const [ico, t, s] = msgs[filter] || msgs.all;
      msgsList.innerHTML = `<div class="empty"><div class="empty-icon">${ico}</div><h3 class="empty-title">${t}</h3><p class="empty-sub">${s}</p></div>`;
      return;
    }

    filtered.forEach(m => {
      if (document.querySelector(`[data-id="${m.id}"]`)) return;
      msgsList.appendChild(buildCard(m));
    });
  }

  function buildCard(m) {
    const isUnread = !m.read;
    const card = document.createElement('div');
    card.dataset.id = m.id;

    const mood = detectMood(m.text);
    const len  = (m.text||'').length;
    const sizeClass = len < 80 ? 'msg-short' : len < 220 ? 'msg-medium' : 'msg-long';

    card.className = [
      'msg-card',
      isUnread ? 'unread-card' : '',
      mood ? `mood-${mood}` : '',
      sizeClass,
    ].filter(Boolean).join(' ');

    const age  = timeAgo(m.timestamp);
    const pollHTML = m.poll
      ? `<div class="card-poll">${m.poll.vibe ? `<span class="poll-chip">😄 ${esc(m.poll.vibe)}</span>` : ''}${m.poll.know ? `<span class="poll-chip">🤝 ${esc(m.poll.know)}</span>` : ''}</div>`
      : '';
    const moodChip = getMoodChip(m.text);

    card.innerHTML = `
      <div class="card-quote-mark">"</div>
      <div class="card-inner">
        ${bulkMode ? `<input type="checkbox" class="bulk-check" data-id="${m.id}" aria-label="Select message" style="width:18px;height:18px;accent-color:var(--primary);cursor:pointer;margin-bottom:8px">` : ''}
        <p class="card-text">${esc(m.text)}</p>
        ${pollHTML}
        <div class="card-footer">
          <span class="card-time">
            ${isUnread ? '<span class="read-dot"></span>' : ''}
            ${age}
          </span>
          ${m.country ? `<span class="geo-flag">${countryFlag(m.country)}</span>` : ''}
          ${moodChip}
          <div class="card-actions">
            <button class="icon-btn story" data-action="story" data-id="${m.id}" title="Create story poster" aria-label="Create story poster">
              <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><circle cx="6.5" cy="6.5" r="5.5" stroke="currentColor" stroke-width="1.3"/><circle cx="6.5" cy="6.5" r="2" stroke="currentColor" stroke-width="1.2"/></svg>
            </button>
            <button class="icon-btn del" data-action="delete" data-id="${m.id}" title="Delete" aria-label="Delete">
              <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 3h9M5 3V2h3v1M5.5 5.5v4M7.5 5.5v4M3.5 3l.5 7.5a1 1 0 001 .9h4a1 1 0 001-.9L11 3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
          </div>
        </div>
      </div>`;

    // Bulk checkbox
    const chk = card.querySelector('.bulk-check');
    if (chk) chk.addEventListener('change', e => {
      if (e.target.checked) selected.add(m.id); else selected.delete(m.id);
      card.classList.toggle('selected-card', e.target.checked);
      bulkCountTxt.textContent = `${selected.size} selected`;
    });

    // Action buttons
    card.querySelectorAll('[data-action]').forEach(btn => {
      btn.addEventListener('click', e => {
        const id     = e.currentTarget.dataset.id;
        const action = e.currentTarget.dataset.action;
        if (action === 'delete') confirmDeleteMsg(id, e.currentTarget.closest('.msg-card'));
        if (action === 'story')  openStoryModal(m);
      });
    });

    return card;
  }

  // ── Confirmation modal ──────────────────────────────────────────────────────
  let _confirmResolve = null;
  const confirmOverlay = document.getElementById('confirm-overlay');
  const confirmOk      = document.getElementById('confirm-ok');
  const confirmCancel  = document.getElementById('confirm-cancel');

  function showConfirm({ icon='🗑️', title='Are you sure?', desc='This cannot be undone.', okLabel='Delete', okDanger=true }) {
    document.getElementById('confirm-icon').textContent  = icon;
    document.getElementById('confirm-title').textContent = title;
    document.getElementById('confirm-desc').textContent  = desc;
    confirmOk.textContent = okLabel;
    confirmOk.style.color = okDanger ? '#f87171' : 'var(--primary)';
    confirmOk.style.borderColor = okDanger ? 'rgba(248,113,113,.4)' : 'rgba(255,107,53,.4)';
    confirmOk.style.background  = okDanger ? 'rgba(248,113,113,.18)' : 'rgba(255,107,53,.12)';
    confirmOverlay.classList.add('show');
    return new Promise(res => { _confirmResolve = res; });
  }

  confirmOk.addEventListener('click', () => {
    confirmOverlay.classList.remove('show');
    if (_confirmResolve) { _confirmResolve(true); _confirmResolve = null; }
  });
  confirmCancel.addEventListener('click', () => {
    confirmOverlay.classList.remove('show');
    if (_confirmResolve) { _confirmResolve(false); _confirmResolve = null; }
  });
  confirmOverlay.addEventListener('click', e => {
    if (e.target === confirmOverlay) confirmCancel.click();
  });

  async function confirmDeleteMsg(id, cardEl) {
    const confirmed = await showConfirm({ icon:'🗑️', title:'Delete message?', desc:'This message will be permanently deleted. It cannot be recovered.', okLabel:'Yes, delete' });
    if (!confirmed) return;
    if (cardEl) cardEl.style.opacity = '.4';
    try {
      const res  = await fetch('/api/delete', { method:'DELETE', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:user, id, token: authToken}) });
      const data = await res.json();
      if (!res.ok) { showToast(data.error || 'Failed to delete.', 'red'); if (cardEl) cardEl.style.opacity=''; return; }
      messages = messages.filter(m => m.id !== id);
      if (cardEl) cardEl.remove();
      updateCounts(totalServer - 1, unreadCount);
      if (!messages.length) render();
    } catch { showToast('Network error.', 'red'); if (cardEl) cardEl.style.opacity = ''; }
  }

      messages = messages.filter(m => m.id !== id);

      updateCounts(totalServer - 1, unreadCount);

  // ── Poll Results ──────────────────────────────────────────────────────────
  function renderPollResults() {
    if (!pollStats) return;

    // pollStats shape: { questions: [{id,text,options,counts}] } OR legacy {vibe:{},know:{}}
    // Normalise to array of {text, options:[{label,count}], total}
    let questions = [];
    if (pollStats.questions && Array.isArray(pollStats.questions)) {
      questions = pollStats.questions.map(q => {
        const total = Object.values(q.counts||{}).reduce((a,b)=>a+b,0);
        const opts  = (q.options||[]).map(o => ({ label:o, count:(q.counts||{})[o]||0 }));
        return { text: q.text, opts, total };
      });
    } else {
      // Legacy vibe/know format
      const labels = { vibe:'How they describe you', know:'How well they know you' };
      for (const [cat, counts] of Object.entries(pollStats)) {
        const total = Object.values(counts).reduce((a,b)=>a+b,0);
        const opts  = Object.entries(counts).sort((a,b)=>b[1]-a[1]).map(([l,c])=>({label:l,count:c}));
        questions.push({ text: labels[cat]||cat, opts, total });
      }
    }

    if (!questions.length) return;
    pollSection.classList.add('show');

    const grandTotal = questions.reduce((a,q)=>a+q.total,0);
    const totalEl = document.getElementById('poll-total-votes');
    if (totalEl) totalEl.textContent = grandTotal + ' vote' + (grandTotal!==1?'s':'');

    let html = '';
    questions.forEach(q => {
      const maxCount = Math.max(...q.opts.map(o=>o.count), 1);
      html += `<div class="poll-res-q">
        <div class="poll-res-q-title">${esc(q.text)}</div>
        <div class="poll-res-opts">
          ${q.opts.map(o => {
            const pct  = q.total ? Math.round(o.count/q.total*100) : 0;
            const lead = o.count === maxCount && o.count > 0;
            return `<div class="poll-res-row">
              <div class="poll-res-row-top">
                <span class="poll-res-label">${esc(o.label)}</span>
                <span class="poll-res-meta"><span>${pct}%</span><span>${o.count} vote${o.count!==1?'s':''}</span></span>
              </div>
              <div class="poll-res-track"><div class="poll-res-fill${lead?' leader':''}" style="width:${pct}%"></div></div>
            </div>`;
          }).join('')}
        </div>
      </div>`;
    });
    pollContent.innerHTML = html;

    // Wire share results button
    const shareBtn = document.getElementById('btn-poll-share-result');
    if (shareBtn) {
      shareBtn.onclick = () => openPollPoster(questions);
    }
  }

  // ── Poll Results Poster ───────────────────────────────────────────────────
  function openPollPoster(questions) {
    const modal  = document.getElementById('poll-poster-modal');
    const canvas = document.getElementById('poll-poster-canvas');
    modal.classList.add('show');
    drawPollPoster(canvas, questions);

    document.getElementById('poll-poster-close').onclick  = () => modal.classList.remove('show');
    modal.addEventListener('click', e => { if (e.target===modal) modal.classList.remove('show'); });

    document.getElementById('btn-poll-poster-dl').onclick = () => {
      const a = document.createElement('a');
      a.download = `poll-results-${user}.png`;
      a.href = canvas.toDataURL('image/png');
      a.click();
    };
    document.getElementById('btn-poll-poster-share').onclick = async () => {
      try {
        canvas.toBlob(async blob => {
          const file = new File([blob], 'poll-results.png', { type:'image/png' });
          if (navigator.canShare?.({files:[file]})) {
            await navigator.share({ files:[file], title:'Poll Results', text:`See my poll results on AskThat! ${BASE_URL}` });

  function drawPollPoster(canvas, questions) {
    const W = 1080, H = 1080;
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext('2d');

    // Background gradient
    const bg = ctx.createLinearGradient(0,0,W,H);
    bg.addColorStop(0,'#0d0a08'); bg.addColorStop(1,'#1a0f08');
    ctx.fillStyle = bg; ctx.fillRect(0,0,W,H);

    // Subtle orb
    const orb = ctx.createRadialGradient(W*.8,H*.15,0,W*.8,H*.15,W*.55);
    orb.addColorStop(0,'rgba(255,107,53,0.18)'); orb.addColorStop(1,'transparent');
    ctx.fillStyle = orb; ctx.fillRect(0,0,W,H);

    // Header
    ctx.fillStyle = '#ff6b35';
    ctx.font = 'bold 44px sans-serif';
    ctx.fillText('📊', 72, 100);

    const grad = ctx.createLinearGradient(0,0,W,0);
    grad.addColorStop(0,'#ff477e'); grad.addColorStop(0.5,'#ff6b35'); grad.addColorStop(1,'#ffbf69');
    ctx.fillStyle = grad;
    ctx.font = 'bold 56px sans-serif';
    ctx.fillText('Poll Results', 140, 106);

    ctx.fillStyle = 'rgba(255,248,240,0.45)';
    ctx.font = '32px sans-serif';
    ctx.fillText(`askthat.pages.dev/ask/${user}`, 72, 156);

    // Divider
    ctx.strokeStyle = 'rgba(255,200,130,0.18)'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(72,185); ctx.lineTo(W-72,185); ctx.stroke();

    // Questions
    let y = 230;
    const barH = 28, barR = 14, padX = 72, barW = W - padX*2;

    questions.forEach(q => {
      if (y > H - 120) return;
      // Question text (wrap if needed)
      ctx.fillStyle = 'rgba(255,248,240,0.9)';
      ctx.font = 'bold 36px sans-serif';
      const maxW = W - padX*2;
      let qText = q.text;
      if (ctx.measureText(qText).width > maxW) qText = qText.slice(0,45) + '…';
      ctx.fillText(qText, padX, y); y += 52;

      const maxCount = Math.max(...q.opts.map(o=>o.count), 1);
      q.opts.forEach(o => {
        if (y > H - 80) return;
        const pct  = q.total ? Math.round(o.count/q.total*100) : 0;
        const lead = o.count === maxCount && o.count > 0;
        const fillW = Math.max((pct/100)*barW, 4);

        // Track
        ctx.fillStyle = 'rgba(255,255,255,0.07)';
        roundRect(ctx, padX, y, barW, barH, barR);

        // Fill
        if (lead) {
          const fg = ctx.createLinearGradient(padX,0,padX+fillW,0);
          fg.addColorStop(0,'#ff477e'); fg.addColorStop(1,'#ff6b35');
          ctx.fillStyle = fg;
        } else {
          ctx.fillStyle = 'rgba(255,107,53,0.35)';
        }
        roundRect(ctx, padX, y, fillW, barH, barR);

        // Label
        ctx.fillStyle = lead ? '#ffffff' : 'rgba(255,248,240,0.75)';
        ctx.font = lead ? 'bold 22px sans-serif' : '22px sans-serif';
        ctx.fillText(o.label.slice(0,32), padX+14, y + barH/2 + 8);

        // Pct
        ctx.fillStyle = lead ? '#ffbf69' : 'rgba(255,248,240,0.5)';
        ctx.font = 'bold 22px sans-serif';
        ctx.textAlign = 'right';
        ctx.fillText(pct + '%  ' + o.count + 'v', padX + barW - 10, y + barH/2 + 8);
        ctx.textAlign = 'left';

        y += barH + 12;
      });
      y += 28;
    });

    // Footer
    ctx.fillStyle = 'rgba(255,248,240,0.3)';
    ctx.font = '28px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Vote at askthat.pages.dev/ask/' + user, W/2, H - 50);
    ctx.textAlign = 'left';
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
    ctx.quadraticCurveTo(x+w,y,x+w,y+r);
    ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
    ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
    ctx.closePath(); ctx.fill();
  }

  // Per-prompt font picker
  function posterFont(type, size, weight='700') {
    const fonts = {
      ask:      POSTER_FONTS['Playfair']     ? `${weight} ${size}px 'Playfair', Georgia, serif` : `${weight} ${size}px Georgia,serif`,
      hottake:  POSTER_FONTS['Righteous']    ? `400 ${size}px 'Righteous', sans-serif`          : `800 ${size}px sans-serif`,
      advice:   POSTER_FONTS['Playfair']     ? `${weight} ${size}px 'Playfair', Georgia, serif` : `${weight} ${size}px Georgia,serif`,
      trust:    POSTER_FONTS['SpaceGrotesk'] ? `${weight} ${size}px 'SpaceGrotesk', sans-serif` : `${weight} ${size}px sans-serif`,
      rate:     POSTER_FONTS['Righteous']    ? `400 ${size}px 'Righteous', sans-serif`          : `800 ${size}px sans-serif`,
      '3words': POSTER_FONTS['SpaceGrotesk'] ? `${weight} ${size}px 'SpaceGrotesk', sans-serif` : `${weight} ${size}px sans-serif`,
      ai:       POSTER_FONTS['Playfair']     ? `italic ${weight} ${size}px 'Playfair', Georgia, serif` : `italic ${weight} ${size}px Georgia,serif`,
      message:  POSTER_FONTS['Playfair']     ? `italic 700 ${size}px 'Playfair', Georgia, serif` : `italic 700 ${size}px Georgia,serif`,
    };
    return fonts[type] || `${weight} ${size}px sans-serif`;
  }

    ctx.fillText('AskThat · anonymous message', W/2, 140); ctx.globalAlpha=1;

    ctx.font = posterFont('message', 320);

    const cardPad=70, cardX=cardPad, cardW=W-cardPad*2, cardY=300, cardH=900;
    // Card background with subtle gradient
    const cardGrad = ctx.createLinearGradient(cardX, cardY, cardX+cardW, cardY+cardH);
    cardGrad.addColorStop(0,'rgba(255,255,255,0.10)');
    cardGrad.addColorStop(1,'rgba(255,255,255,0.05)');
    ctx.fillStyle=cardGrad; ctx.strokeStyle='rgba(255,255,255,0.18)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.roundRect(cardX,cardY,cardW,cardH,52); ctx.fill(); ctx.stroke();

    // Message text — Playfair italic, size based on length
    const txt = msg.text || '';
    const fs = txt.length<55 ? 96 : txt.length<110 ? 76 : txt.length<190 ? 58 : 46;
    ctx.font = posterFont('message', fs);
    ctx.fillStyle=T.headline; ctx.globalAlpha=0.95;
    const lines = wrapTextLines(ctx, txt, cardW-130);
    const lineH = fs * 1.45;
    const txtY  = cardY + (cardH - lines.length*lineH)/2 + fs*.85;
    lines.forEach((l,i) => ctx.fillText(l, W/2, txtY + i*lineH));
    ctx.globalAlpha=1;

    // Closing quote
    ctx.font = posterFont('message', 80);
    ctx.fillStyle=T.headline; ctx.globalAlpha=0.07;
    ctx.fillText('"', W/2+320, cardY+cardH-40); ctx.globalAlpha=1;

    // "someone asked → username" tag
    ctx.font=`500 32px sans-serif`; ctx.fillStyle=T.sub; ctx.globalAlpha=0.55;
    ctx.fillText('anonymous → ' + user, W/2, cardY+cardH+56); ctx.globalAlpha=1;

    // Avatar + username row
    const avY = 1380;
    ctx.fillStyle='rgba(255,255,255,0.13)';
    ctx.beginPath(); ctx.arc(W/2-80, avY, 50, 0, Math.PI*2); ctx.fill();
    ctx.font=`700 42px sans-serif`; ctx.fillStyle=T.headline;
    ctx.fillText(user.charAt(0).toUpperCase(), W/2-80, avY+15);
    ctx.font=`700 46px sans-serif`; ctx.textAlign='left';
    ctx.fillText(user, W/2-80+64, avY+15); ctx.textAlign='center';

    // CTA button
    const ctaW=740, ctaH=108, ctaX=(W-ctaW)/2, ctaY=1476;
    const cf=T.ctaFill(ctx,W); if(cf) ctx.fillStyle=cf;
    ctx.beginPath(); ctx.roundRect(ctaX,ctaY,ctaW,ctaH,54); ctx.fill();
    ctx.font=`700 40px sans-serif`; ctx.fillStyle=T.ctaText;
    ctx.fillText('Send me one too →', W/2, ctaY+70);

    // Link
    ctx.font=`400 30px sans-serif`; ctx.fillStyle=T.link; ctx.globalAlpha=0.75;
    ctx.fillText('askthat.pages.dev/ask/'+user, W/2, ctaY+160);
    // Footer
    ctx.globalAlpha=0.28; ctx.fillStyle=T.sub; ctx.font=`400 26px sans-serif`;
    ctx.fillText('100% anonymous · no account needed', W/2, H-72);
    ctx.globalAlpha=1;
  }

  // ── Prompt poster drawing ──────────────────────────────────────────────
  function drawPromptPoster(ctx, T, W, H, type) {
    const P = PROMPT_TYPES[type] || PROMPT_TYPES.ask;
    const link = promptLink(type);
    const linkShort = link.replace('https://','');

    // Brand
    ctx.globalAlpha=0.5; ctx.font='500 36px sans-serif'; ctx.fillStyle=T.sub;
    ctx.fillText('@ AskThat', W/2, 155); ctx.globalAlpha=1;

    // Avatar
    ctx.fillStyle='rgba(255,255,255,0.13)';
    ctx.beginPath(); ctx.arc(W/2,370,100,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.28)'; ctx.lineWidth=4;
    ctx.beginPath(); ctx.arc(W/2,370,100,0,Math.PI*2); ctx.stroke();
    ctx.font = posterFont(type, 82);
    ctx.fillStyle=T.headline;
    ctx.fillText(user.charAt(0).toUpperCase(),W/2,404);
    ctx.font = posterFont(type, 56);
    ctx.fillStyle=T.headline;
    ctx.fillText(user,W/2,520);

    if (type === 'ask') {
      _drawAskPrompt(ctx,T,W,H,link,linkShort);
    } else if (type === '3words') {
      _draw3WordsPrompt(ctx,T,W,H,link,linkShort);
    } else if (type === 'trust') {
      _drawTrustPrompt(ctx,T,W,H,link,linkShort);
    } else if (type === 'rate') {
      _drawRatePrompt(ctx,T,W,H,link,linkShort);
    } else if (type === 'hottake') {
      _drawHotTakePrompt(ctx,T,W,H,link,linkShort);
    } else if (type === 'advice') {
      _drawAdvicePrompt(ctx,T,W,H,link,linkShort);
    } else if (type === 'ai') {
      _drawAIPrompt(ctx,T,W,H,link,linkShort);
    }

    // Footer
    ctx.font='400 30px sans-serif'; ctx.fillStyle=T.sub; ctx.globalAlpha=0.35;
    ctx.fillText('100% anonymous · askthat.pages.dev', W/2, H-80);
    ctx.globalAlpha=1;
  }

  function _drawPromptCard(ctx,T,W,promptText,subText,y,cardH,type='ask') {
    const px=80, pw=W-160;
    ctx.fillStyle='rgba(255,255,255,0.10)'; ctx.strokeStyle='rgba(255,255,255,0.20)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.roundRect(px,y,pw,cardH,40); ctx.fill(); ctx.stroke();
    ctx.font = posterFont(type, 76); ctx.fillStyle=T.headline;
    wrapText(ctx,promptText,W/2,y+100,pw-80,90);
    if(subText){
      ctx.font=`400 42px sans-serif`; ctx.fillStyle=T.sub; ctx.globalAlpha=0.7;
      ctx.fillText(subText,W/2,y+cardH-70); ctx.globalAlpha=1;
    }
  }

  function _drawCTA(ctx,T,W,label,ctaY,link,linkShort) {
    const cf=T.ctaFill(ctx,W); if(cf) ctx.fillStyle=cf;
    ctx.beginPath(); ctx.roundRect((W-700)/2,ctaY,700,110,55); ctx.fill();
    ctx.font='700 44px sans-serif'; ctx.fillStyle=T.ctaText;
    ctx.fillText(label, W/2, ctaY+73);
    ctx.font='bold 36px sans-serif'; ctx.fillStyle=T.link; ctx.globalAlpha=0.85;
    ctx.fillText(linkShort, W/2, ctaY+160); ctx.globalAlpha=1;
  }

  function _drawAskPrompt(ctx,T,W,H,link,linkShort) {
    _drawPromptCard(ctx,T,W,'Ask me anything',
      'Send something honest — I\'ll never know it was you',680,600,'ask');
    _drawCTA(ctx,T,W,'Send anonymously →',1380,link,linkShort);
  }

  function _draw3WordsPrompt(ctx,T,W,H,link,linkShort) {
    const slotY=680, slotW=280, slotH=110, gap=22, totalW=slotW*3+gap*2;
    const startX=(W-totalW)/2;
    ['_ _ _','_ _ _','_ _ _'].forEach((_,i)=>{
      ctx.fillStyle='rgba(255,255,255,0.10)'; ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.roundRect(startX+i*(slotW+gap),slotY,slotW,slotH,20); ctx.fill(); ctx.stroke();
    });
    const nums=['1st','2nd','3rd'];
    ctx.font='500 32px sans-serif'; ctx.fillStyle=T.sub; ctx.globalAlpha=0.5;
    nums.forEach((n,i)=>ctx.fillText(n,startX+i*(slotW+gap)+slotW/2,slotY+slotH+42)); ctx.globalAlpha=1;

    ctx.font = posterFont('3words', 78); ctx.fillStyle=T.headline;
    wrapText(ctx,'Describe me in exactly 3 words.',W/2,860,860,96);
    ctx.font='400 46px sans-serif'; ctx.fillStyle=T.sub; ctx.globalAlpha=0.65;
    ctx.fillText('no more, no less.',W/2,1000); ctx.globalAlpha=1;
    _drawCTA(ctx,T,W,'Type your 3 words →',1120,link,linkShort);
  }

  function _drawTrustPrompt(ctx,T,W,H,link,linkShort) {
    const levels=[['👻','Stranger'],['🙃','Acquaintance'],['🤝','Friend'],['🔥','Bestie']];
    const btnW=440, btnH=100, startY=680, gap=24;
    levels.forEach(([emoji,label],i)=>{
      const alpha = 0.06 + i*0.05;
      ctx.fillStyle=`rgba(255,255,255,${alpha})`; ctx.strokeStyle=`rgba(255,255,255,${0.10+i*0.06})`; ctx.lineWidth=2;
      ctx.beginPath(); ctx.roundRect((W-btnW)/2,startY+i*(btnH+gap),btnW,btnH,24); ctx.fill(); ctx.stroke();
      ctx.font='52px sans-serif'; ctx.fillStyle=T.headline;
      ctx.fillText(emoji,(W-btnW)/2+70,startY+i*(btnH+gap)+66);
      ctx.font = posterFont('trust', 42); ctx.textAlign='left';
      ctx.fillText(label,(W-btnW)/2+140,startY+i*(btnH+gap)+66); ctx.textAlign='center';
    });
    ctx.font = posterFont('trust', 70); ctx.fillStyle=T.headline;
    ctx.fillText('How well do you know me?',W/2,1162);
    _drawCTA(ctx,T,W,'Pick your trust level →',1240,link,linkShort);
  }

  function _drawRatePrompt(ctx,T,W,H,link,linkShort) {
    ctx.font = posterFont('rate', 300); ctx.fillStyle=T.headline; ctx.globalAlpha=0.10;
    ctx.fillText('?',W/2,1050); ctx.globalAlpha=1;

    const nums=Array.from({length:10},(_,i)=>i+1);
    const btnW=162, btnH=162, cols=5, gap=18;
    const gridW=cols*btnW+(cols-1)*gap;
    const startX=(W-gridW)/2;
    nums.forEach((n,i)=>{
      const col=i%cols, row=Math.floor(i/cols);
      const x=startX+col*(btnW+gap), y=680+row*(btnH+gap);
      const pct=(n-1)/9;
      ctx.fillStyle=`rgba(255,107,53,${0.08+pct*0.22})`; ctx.strokeStyle=`rgba(255,107,53,${0.20+pct*0.40})`; ctx.lineWidth=2;
      ctx.beginPath(); ctx.roundRect(x,y,btnW,btnH,24); ctx.fill(); ctx.stroke();
      ctx.font = posterFont('rate', n===10?52:60); ctx.fillStyle=T.headline;
      ctx.fillText(String(n),x+btnW/2,y+btnH/2+22);
    });
    ctx.font = posterFont('rate', 74); ctx.fillStyle=T.headline;
    wrapText(ctx,'Rate my vibe 1 to 10.',W/2,1124,860,92);
    _drawCTA(ctx,T,W,'Tap to rate →',1260,link,linkShort);
  }

  function _drawHotTakePrompt(ctx,T,W,H,link,linkShort) {
    ctx.font='200px sans-serif'; ctx.fillText('🌶️',W/2,860);
    ctx.font = posterFont('hottake', 84); ctx.fillStyle=T.headline;
    wrapText(ctx,'Hot take about me. Go.',W/2,950,860,100);
    ctx.font='400 50px sans-serif'; ctx.fillStyle=T.sub; ctx.globalAlpha=0.65;
    wrapText(ctx,'Say what you actually think. I can handle it.',W/2,1090,820,64); ctx.globalAlpha=1;
    _drawCTA(ctx,T,W,'Send your hot take →',1200,link,linkShort);
  }

  function _drawAdvicePrompt(ctx,T,W,H,link,linkShort) {
    ctx.font='200px sans-serif'; ctx.fillText('💡',W/2,860);
    ctx.font = posterFont('advice', 76); ctx.fillStyle=T.headline;
    wrapText(ctx,'Give me one piece of advice.',W/2,960,860,96);
    ctx.font='400 48px sans-serif'; ctx.fillStyle=T.sub; ctx.globalAlpha=0.65;
    wrapText(ctx,'Something you think I actually need to hear.',W/2,1100,820,62); ctx.globalAlpha=1;
    _drawCTA(ctx,T,W,'Give me advice →',1210,link,linkShort);
  }

  function _drawAIPrompt(ctx,T,W,H,link,linkShort) {
    const promptText = aiGameText || 'What\'s one thing you\'d never say to my face?';
    ctx.font='120px sans-serif'; ctx.fillText('✨',W/2,820);
    ctx.font = posterFont('ai', 74); ctx.fillStyle=T.headline;
    wrapText(ctx,promptText,W/2,940,860,96);
    ctx.font='500 40px sans-serif'; ctx.fillStyle=T.sub; ctx.globalAlpha=0.55;
    ctx.fillText('AI-generated · 100% anonymous',W/2,1110); ctx.globalAlpha=1;
    _drawCTA(ctx,T,W,'Answer anonymously →',1200,link,linkShort);
  }

  function roundRectFill(ctx, x, y, w, h, r) {
    ctx.beginPath(); ctx.roundRect(x,y,w,h,r); ctx.fill();
  }
  function wrapText(ctx, text, x, y, maxW, lh) {
    const words=text.split(' '); let line='', cy=y;
    for(const w of words){const t=line?line+' '+w:w;if(ctx.measureText(t).width>maxW&&line){ctx.fillText(line,x,cy);line=w;cy+=lh;}else line=t;}
    if(line)ctx.fillText(line,x,cy);
  }
  function wrapTextLines(ctx, text, maxW) {
    const words = text.split(' '); const lines = []; let line = '';
    for (const w of words) {
      const t = line ? line+' '+w : w;
      if (ctx.measureText(t).width > maxW && line) { lines.push(line); line = w; }
      else line = t;
    }
    if (line) lines.push(line);
    return lines;
  }

  // Download (message poster modal)
  document.getElementById('btn-story-download').addEventListener('click', () => {
    const a=document.createElement('a');
    a.download=`askthat-${user}-msg.png`;
    a.href=document.getElementById('story-canvas').toDataURL('image/png');
    a.click();
  });

  // WhatsApp share
  document.getElementById('btn-story-wa').addEventListener('click', () => {
    const canvas=document.getElementById('story-canvas');
    canvas.toBlob(async blob => {
      const file=new File([blob],'askthat-story.png',{type:'image/png'});
      const shareText=`Ask me anything anonymously! 🙈\n${BASE_URL}`;
      if(navigator.canShare?.({files:[file]})){
        try{await navigator.share({files:[file],text:shareText,title:`Ask ${user} anonymously`});return;}
        catch(err){if(err.name==='AbortError')return;}
      }
      // Fallback: download + open WhatsApp
      const a=document.createElement('a'); a.download=`askthat-${user}-story.png`; a.href=URL.createObjectURL(blob); a.click();
      setTimeout(()=>{
        window.open(`https://wa.me/?text=${encodeURIComponent(shareText)}`);
        showToast('📸 Image saved — paste it into WhatsApp Status!','green');
      },700);
    },'image/png');
  });

  // Generic share
  document.getElementById('btn-story-share-native').addEventListener('click', () => {
    const canvas=document.getElementById('story-canvas');
    canvas.toBlob(async blob=>{
      const file=new File([blob],'askthat-story.png',{type:'image/png'});
      if(navigator.canShare?.({files:[file]})){
        try{await navigator.share({files:[file],text:`Ask me anything!\n${BASE_URL}`,title:`Ask ${user} anonymously`});return;}catch(_){}
      }
      document.getElementById('btn-story-download').click();
    },'image/png');
  });

  // Caption copy
  document.getElementById('btn-copy-caption').addEventListener('click', function(){
    navigator.clipboard.writeText(BASE_URL).then(()=>{
      this.textContent='✓ Copied!'; this.classList.add('copied');
      setTimeout(()=>{this.textContent='Copy link';this.classList.remove('copied');},2000);
    });
  });

  // ── Helpers ────────────────────────────────────────────────────────────────
  function fmtNum(n){ return n>=1000 ? (n/1000).toFixed(1)+'k' : String(n); }

  const COUNTRY_FLAGS = {'IN':'🇮🇳','US':'🇺🇸','GB':'🇬🇧','CA':'🇨🇦','AU':'🇦🇺','DE':'🇩🇪','FR':'🇫🇷','JP':'🇯🇵','BR':'🇧🇷','KR':'🇰🇷','SG':'🇸🇬','PK':'🇵🇰','BD':'🇧🇩','NG':'🇳🇬','PH':'🇵🇭','ID':'🇮🇩','MX':'🇲🇽','AE':'🇦🇪','SA':'🇸🇦','TR':'🇹🇷'};
  function countryFlag(code) { return COUNTRY_FLAGS[code] || '🌍'; }

  const MOOD_EMOJI = { wholesome:'🤍',funny:'😂',spicy:'🌶️',deep:'🤔',flirty:'💕',sad:'🥺',supportive:'💪',weird:'👀' };
  function detectMood(text) {
    const t = (text||'').toLowerCase();
    if(/love|appreciate|amazing|best|kind|sweet|heart|grateful/.test(t)) return 'wholesome';
    if(/lol|haha|funny|hilarious|joke|lmao|bruh/.test(t)) return 'funny';
    if(/hot|crush|like you|pretty|attractive|date/.test(t)) return 'flirty';
    if(/why|think|wonder|feel|believe|mind|actually|real talk/.test(t)) return 'deep';
    if(/miss|sad|alone|wish|hurt|sorry|cry/.test(t)) return 'sad';
    if(/you got|keep going|proud|believe in|support/.test(t)) return 'supportive';
    if(/what the|random|weird|unexpected/.test(t)) return 'weird';
    return null;
  }
  function getMoodChip(text) {
    const mood = detectMood(text);
    if (!mood) return '';
    return `<span class="mood-chip mood-${mood}">${MOOD_EMOJI[mood]} ${mood}</span>`;
  }

  function timeAgo(ts, future=false){
    const diff=Math.round((future?ts-Date.now():Date.now()-ts)/1000);
    if(diff<60) return future?'in a minute':'just now';
    if(diff<3600) return future?`in ${Math.floor(diff/60)}m`:`${Math.floor(diff/60)}m ago`;
    if(diff<86400) return future?`in ${Math.floor(diff/3600)}h`:`${Math.floor(diff/3600)}h ago`;
    return future?`in ${Math.floor(diff/86400)}d`:`${Math.floor(diff/86400)}d ago`;
  }

  function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function showToast(msg, type='green'){
    const el=document.getElementById('toast');
    el.textContent=msg; el.className=`toast show ${type}`;
    clearTimeout(toastTimer);
    toastTimer=setTimeout(()=>el.className='toast',3400);
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      storyModal.classList.remove('show');
    }
  });

})();
</script>
